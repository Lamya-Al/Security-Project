<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Registration</title>
</head>

<body>

<table width="100%" height="100%" border="0">

  <!-- Top spacer -->
  <tr height="60%">
    <td></td>
  </tr>

  <!-- Center content -->
  <tr>
    <td align="center">

      <h2 id="formTitle">Register</h2>

      <form id="authForm">
        <label>Username:</label><br>
        <input type="text" id="username" required minlength="4" pattern="^[a-zA-Z0-9_]+$"><br><br>

        <label>Password:</label><br>
        <input type="password" id="password" required minlength="6" pattern="^(?=.*[A-Z])(?=.*[0-9]).+$"><br><br>

        <button type="submit">Submit</button>
      </form>

      <p id="toggleText" onclick="toggleForm()">
        Already have an account? Login
      </p>

    </td>
  </tr>

  <!-- Bottom spacer -->
  <tr height="40%">
    <td></td>
  </tr>

</table>

<script>
  let isLogin = false;

  function toggleForm() {
    isLogin = !isLogin;
    document.getElementById('formTitle').innerText = isLogin ? 'Login' : 'Register';
    document.getElementById('toggleText').innerText = isLogin
      ? "Don't have an account? Register"
      : "Already have an account? Login";
  }

  document.getElementById('authForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if (!username || !password) {
      alert('Please fill in all fields');
      return;
    }

    alert(isLogin ? 'Login successful (demo only)' : 'Registration successful (demo only)');
  });
</script>

</body>
</html>
