<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="center">
  {% if error %}
    <p style="color: red; font-weight: bold;">{{ error }}</p>
{% endif %}
<form method="post">

  <h2>Login</h2>

  <label>Username:</label>
  <input type="text" name="username" required minlength="4">

  <label>Password:</label>
  <input type="password" name="password" required minlength="1"><!--required minlength="6"-->

  <button type="submit">Login</button>

  <p><a href="{{ url_for('register') }}">Go to Register</a></p>

</form>
</div>

</body>
</html>
