<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>

<table width="100%" height="100%">
  <tr height="60%"><td></td></tr>

  <tr>
    <td align="center">

      <h2>Login</h2>

      <form>
        <label>Username:</label><br>
        <input type="text" name="username" required minlength="4" pattern="^[a-zA-Z0-9_]+$"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required minlength="6" pattern="^(?=.*[A-Z])(?=.*[0-9]).+$"><br><br>

        <button type="submit">Login</button>
      </form>

      <p><a href="register.html">Go to Register</a></p>

    </td>
  </tr>

  <tr height="40%"><td></td></tr>
</table>

</body>
</html>
