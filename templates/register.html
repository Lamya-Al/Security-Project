<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
</head>
<body>

<table width="100%" height="100%">
  <tr height="60%"><td></td></tr>

  <tr>
    <td align="center">

      <h2>Register</h2>

      <form method="post">

        <label>Role:</label><br>
        <select name="role" required>
          <option value="">Select role</option>
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select><br><br>

        <label>First Name:</label><br>
        <input type="text" name="firstname" required minlength="2"><br><br>

        <label>Last Name:</label><br>
        <input type="text" name="lastname" required minlength="2"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Username:</label><br>
        <input type="text" name="username" required minlength="4" pattern="^[a-zA-Z0-9_]+$"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required minlength="6" ><br><br>

        <label>Confirm Password:</label><br>
        <input type="password" name="confirmPassword" required minlength="6"><br><br>

        <button type="submit">Register</button>
      </form>

      <p><a href="login.html">Go to Login</a></p>

    </td>
  </tr>

  <tr height="40%"><td></td></tr>
</table>

</body>
</html>
